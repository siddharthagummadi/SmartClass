<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - SmartClass</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script> <!-- QR Code JS library -->
    <style>
        /* Main Content */
        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 5px 0px 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .sidebar-header {
            text-align: center;
            padding: 25px 15px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        .sidebar-menu li a {
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            display: block;
            transition: 0.3s;
            font-size: 16px;
            border-left: 4px solid transparent;
        }

        .sidebar-menu li a:hover {
            background: rgba(255,255,255,0.1);
            border-left: 4px solid #4facfe;
        }

        .main-content {
            margin-left: 0;
            transition: all 0.3s ease;
            padding-bottom: 50px;
            min-height: 100vh;
        }

        .top-nav {
            background: rgba(15, 32, 39, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: color 0.3s;
        }
        .menu-toggle:hover {
            color: #4facfe;
        }

        .top-nav-right {
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .top-nav-right span {
            margin-right: 20px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .content {
            padding: 40px;
        }

        .card {
            border: none;
            padding: 30px;
            margin: 20px 0;
            border-radius: 15px;
            background-color: #ffffff;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 22px;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5);
        }

        #qr-box {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qrcode {
            display: inline-block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.8);
            color: #aaa;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 14px;
        }

        /* Styles for Attendance Report */
        .attendance-report {
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            margin-top: 30px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        table, th, td {
            border: none;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            color: #2c3e50;
            font-weight: 700;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .main-content { padding-bottom: 60px; }
            .content { padding: 20px 15px; }
            .top-nav { flex-direction: column; gap: 15px; text-align: center; }
            .top-nav-right { flex-direction: column; gap: 10px; }
            .top-nav-right span { margin-right: 0; }
            
            /* Allow horizontally scrolling tables */
            .attendance-report { overflow-x: auto; padding: 15px; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
            
            #qrcode img { width: 100% !important; height: auto !important; max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            SmartClass
        </div>
        <ul class="sidebar-menu">
            <!-- Link for 'Mark Manual Attendance' -->
            <li><a href="/mark_manual_attendance">Mark Manual Attendance</a></li>
            <!-- Link for 'View Attendance Report' -->
            <li><a href="#" id="view-attendance">View Attendance Report</a></li>
            <!-- Link for 'Attendance visualization' -->
            <li><a href="#" id="visualize-attendance">Visualize Attendance</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <button id="menu-toggle" class="menu-toggle">☰</button>
            <div class="top-nav-right">
                <span><i class="fa fa-chalkboard-teacher"></i> {{ teacher_name }}</span>
                <button class="logout-btn" onclick="window.location.href='/logout'">Logout</button>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <div class="content">
            <div class="row">
                <!-- QR Code Box -->
                <div class="card">
                    <h3>Scan to mark your attendance</h3>
                    <div id="qr-box">
                        <div id="qrcode"></div>
                    </div>
                    <button id="generate-qr" onclick="startQRRefresh()">Generate QR</button>
                    <p id="qr-timer" style="display:none; font-size: 18px; font-weight: bold; color: #e74c3c; margin-top: 15px;"></p>
                </div>

                <!-- Attendance Report Download Box -->
                <div class="card">
                    <h3>Download Attendance Report</h3>
                    <button class="download-btn" onclick="downloadReport('pdf')">Download PDF</button>
                    <button class="download-btn" onclick="downloadReport('excel')">Download Excel</button>
                </div>

                <!-- Attendance Report -->
                <div id="attendance-report" class="card attendance-report" style="display:none;">
                    <h3>Attendance Report</h3>
                    <div id="attendance-table"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>SmartClass - A Secure Attendance System &copy; 2025</p>
    </footer>

    <!-- JS -->
    <script>
    let qrInterval = null;
    let countdownInterval = null;
    let qrExpiryTime = 10; // seconds

    // Sidebar Toggle
    document.getElementById('menu-toggle').addEventListener('click', function () {
        var sidebar = document.getElementById('sidebar');
        var mainContent = document.querySelector('.main-content');

        if (sidebar.style.left === '-250px' || sidebar.style.left === '') {
            sidebar.style.left = '0';
            if(window.innerWidth > 768) mainContent.style.marginLeft = '250px';
        } else {
            sidebar.style.left = '-250px';
            if(window.innerWidth > 768) mainContent.style.marginLeft = '0';
        }
    });

    // Attendance Report Load
    document.getElementById('view-attendance').addEventListener('click', function () {
        const reportContainer = document.getElementById('attendance-report');
        const tableContainer = document.getElementById('attendance-table');

        fetch('/api/attendance_report')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    const students = data.data;
                    let tableHTML = '<table><tr><th>Student Name</th><th>Roll Number</th><th>Attendance</th><th>Time</th></tr>';
                    
                    if (students.length === 0) {
                        tableHTML += '<tr><td colspan="4" style="text-align:center;">No attendance records found.</td></tr>';
                    } else {
                        students.forEach(student => {
                            let color = student.attendance === 'Present' ? 'green' : 'red';
                            tableHTML += `<tr>
                                <td>${student.name}</td>
                                <td>${student.rollNumber}</td>
                                <td style="color: ${color}; font-weight: bold;">${student.attendance}</td>
                                <td>${student.time}</td>
                            </tr>`;
                        });
                    }
                    tableHTML += '</table>';

                    tableContainer.innerHTML = tableHTML;
                    reportContainer.style.display = 'block';
                } else {
                    tableContainer.innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
                    reportContainer.style.display = 'block';
                }
            })
            .catch(error => {
                tableContainer.innerHTML = `<p style="color:red;">Failed to fetch report.</p>`;
                reportContainer.style.display = 'block';
            });
    });

    // Visualize
    document.getElementById('visualize-attendance').addEventListener('click', function () {
        alert("Coming Soon....");
    });

    // Dynamic QR Generator
    function startQRRefresh() {
        document.getElementById('generate-qr').style.display = 'none';
        document.getElementById('qr-timer').style.display = 'block';
        if (countdownInterval) clearInterval(countdownInterval);
        generateDynamicQR();
    }

    function generateDynamicQR() {
        fetch('/generate_qr')
            .then(response => response.json())
            .then(data => {
                if(data.qr_code) {
                    const qrBox = document.getElementById('qrcode');
                    qrBox.innerHTML = ''; // Clear old QR

                    new QRCode(qrBox, {
                        text: data.qr_code,
                        width: 200,
                        height: 200,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    // Update expiry time dynamically based on backend response
                    qrExpiryTime = data.expires_in || 15;
                    showCountdown(qrExpiryTime);
                } else {
                    console.error('Failed to generate QR');
                }
            })
            .catch(error => console.error('Error fetching QR:', error));
    }

    function showCountdown(seconds) {
        const timerText = document.getElementById('qr-timer');
        let remaining = seconds;
        timerText.innerText = `QR valid for ${remaining}s`;

        countdownInterval = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(countdownInterval);
                timerText.innerText = "Generating new QR...";
                generateDynamicQR(); // Instantly trigger the next generation
            } else {
                timerText.innerText = `QR valid for ${remaining}s`;
            }
        }, 1000);
    }

    // Report Download via new Backend Pandas/ReportLab API
    function downloadReport(format) {
        if(format === 'excel') {
            window.location.href = '/api/export/excel';
        } else if(format === 'pdf') {
            window.location.href = '/api/export/pdf';
        }
    }
</script>
</body>
</html>
