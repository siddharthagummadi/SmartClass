<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartClass - Face Recognition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 100px;
      color: #fff;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 32, 39, 0.9);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .navbar i {
      margin-right: 15px;
      color: #4facfe;
    }

    #face-recognition-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      width: 420px;
      position: relative;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 30px;
      color: #fff;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      z-index: 1000;
    }
    .back-btn:hover {
      color: #00f7ff;
    }

    .menu-item {
      background: linear-gradient(135deg, #00f2fe, #4facfe);
      border: none;
      padding: 15px 25px;
      color: white;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
      width: 100%;
      margin-top: 20px;
    }

    .menu-item i {
      margin-right: 10px;
    }

    .menu-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6);
    }

    #camera-container {
      margin-top: 30px;
      border: 3px solid #4facfe;
      padding: 10px;
      border-radius: 18px;
      background-color: #0f2027;
      width: 300px;
      height: 300px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
      animation: glow 2s infinite alternate;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(79, 172, 254, 0.3); }
      to   { box-shadow: 0 0 25px rgba(79, 172, 254, 0.6); }
    }

    #camera {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
    }

    #face-box {
      position: absolute;
      top: 50px;
      left: 50px;
      width: 200px;
      height: 200px;
      border: 3px dashed #4facfe;
      border-radius: 10px;
      display: none;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    #recognition-text {
      margin-top: 20px;
      font-weight: 600;
      font-size: 16px;
      color: #4facfe;
    }

    .popup {
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      animation: slideUpFade 1.8s ease forwards;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes slideUpFade {
      0% { bottom: -60px; opacity: 0; }
      40% { bottom: 10px; opacity: 1; }
      80% { bottom: 10px; opacity: 1; }
      100% { bottom: -60px; opacity: 0; }
    }

    #cancel-button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: transparent;
      border: none;
      font-size: 18px;
      color: #888;
      cursor: pointer;
    }

    #cancel-button:hover {
      color: #e63946;
    }

    #sound-toggle {
      margin-top: 15px;
      font-size: 18px;
      cursor: pointer;
      color: #1e90ff;
    }

    @media (max-width: 768px) {
      .navbar { font-size: 20px; padding: 15px; flex-direction: column; text-align: center; gap: 10px; }
      .back-btn { position: relative; top: 0; left: 0; margin-bottom: 10px; }
      #face-recognition-panel {
        width: 95%;
        padding: 20px;
        margin-top: 30px;
      }
      #camera-container {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="/student_dashboard" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <i class="fa-solid fa-chalkboard-user"></i> SmartClass - Face Recognition
  </div>

  <div id="face-recognition-panel">
    <h2 style="color: #ffffff; font-size: 28px; margin-bottom: 20px;">AI Verification</h2>
    <button id="verify-face" class="menu-item">
      <i class="fa-solid fa-camera"></i> Verify Face
    </button>

    <div id="camera-container" class="hidden">
      <button id="cancel-button" title="Close">&#10006;</button>
      <video id="camera" autoplay></video>
      <div id="face-box"></div>
      <p id="recognition-text">Initializing camera...</p>
    </div>

    <div id="popup" class="popup hidden"></div>

    <div id="sound-toggle" title="Toggle sound">
      <i class="fa-solid fa-volume-up"></i> Toggle Sound
    </div>
  </div>

  <!-- Audio elements -->
  <audio id="success-sound" src="https://www.myinstants.com/media/sounds/success-fanfare-trumpets.mp3"></audio>
  <audio id="fail-sound" src="https://www.myinstants.com/media/sounds/error.mp3"></audio>

  <script>
    const verifyButton = document.getElementById("verify-face");
    const cameraContainer = document.getElementById("camera-container");
    const camera = document.getElementById("camera");
    const recognitionText = document.getElementById("recognition-text");
    const popup = document.getElementById("popup");
    const cancelBtn = document.getElementById("cancel-button");
    const faceBox = document.getElementById("face-box");
    const successSound = document.getElementById("success-sound");
    const failSound = document.getElementById("fail-sound");
    const soundToggle = document.getElementById("sound-toggle");

    let soundEnabled = true;

    // Toggle sound on/off
    soundToggle.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundToggle.innerHTML = soundEnabled ? 
        '<i class="fa-solid fa-volume-up"></i> Toggle Sound' : 
        '<i class="fa-solid fa-volume-mute"></i> Sound Muted';
    });

    // Text-to-speech function
    function speak(message) {
      const speech = new SpeechSynthesisUtterance(message);
      speech.lang = "en-US";  // You can change the language here if needed
      window.speechSynthesis.speak(speech);
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        camera.srcObject = stream;
      } catch (err) {
        recognitionText.innerText = "Camera access denied ❌";
        console.error("Error accessing the camera:", err);
      }
    }

    function stopCamera() {
      const stream = camera.srcObject;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        camera.srcObject = null;
      }
    }

    verifyButton.addEventListener("click", async () => {
      cameraContainer.classList.remove("hidden");
      recognitionText.innerText = "Initializing camera...";
      await startCamera();

      faceBox.style.display = "block";

      setTimeout(() => {
        recognitionText.innerText = "Detecting face...";
        
        // Capture image from video
        const canvas = document.createElement("canvas");
        canvas.width = camera.videoWidth;
        canvas.height = camera.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL("image/jpeg");

        fetch('/mark_face_attendance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                recognitionText.innerText = "Face recognized successfully \u2705";
                popup.innerText = "Attendance Marked Successfully \u2705";
                popup.style.backgroundColor = "#28a745";
                if (soundEnabled) speak("Your attendance has been marked successfully");
                
                setTimeout(() => {
                    window.location.href = '/student_dashboard';
                }, 2000);
            } else {
                recognitionText.innerText = "Face not recognized \u274c";
                popup.innerText = "Error: " + data.message;
                popup.style.backgroundColor = "#dc3545";
                if (soundEnabled) speak("Face verification failed");
            }
            popup.classList.remove("hidden");
            
            stopCamera();
            cameraContainer.classList.add("hidden");
            faceBox.style.display = "none";

            setTimeout(() => {
               popup.classList.add("hidden");
            }, 2500);
        })
        .catch(error => {
            popup.innerText = "Server Error!";
            popup.style.backgroundColor = "#dc3545";
            popup.classList.remove("hidden");
            stopCamera();
            cameraContainer.classList.add("hidden");
            faceBox.style.display = "none";
        });
      }, 2000); // 2 second delay to allow face detection simulation
    });

    cancelBtn.addEventListener("click", () => {
      stopCamera();
      cameraContainer.classList.add("hidden");
    });
  </script>
</body>
</html>
