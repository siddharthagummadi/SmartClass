<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Manual Attendance</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* General Styling */
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .attendance-container {
            width: 90%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow-x: auto;
            max-height: 90vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            cursor: pointer;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: 700;
        }

        tbody tr:nth-child(odd) {
            background-color: transparent;
        }

        tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        td:hover {
            background-color: #f1f5f9;
        }

        /* Submit and Back Buttons Styling */
        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .btn-submit, .btn-back {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 0 10px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .btn-submit:hover, .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5);
            background: linear-gradient(135deg, #00f2fe, #4facfe);
        }

        .btn-back {
            background: #e74c3c;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }
        .btn-back:hover {
            background: #c0392b;
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.5);
        }

        .btn-back::before {
            content: '\2190';
            margin-right: 8px;
            font-size: 18px;
        }

        /* Notification Popup */
        .notification-popup {
            position: fixed;
            top: -100px; /* Start off-screen */
            left: 50%;
            transform: translateX(-50%);
            background-color: #dc3545;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            font-size: 18px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: top 0.5s ease, opacity 0.5s ease, visibility 0s 0.5s;
        }

        .notification-popup.show {
            top: 20px;  /* Position it at the top of the page */
            opacity: 1;
            visibility: visible;
            transition: top 0.5s ease, opacity 0.5s ease;
        }

        .popup-btn-close {
            background-color: #dc3545;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            float: right;
        }

        .popup-btn-close:hover {
            background-color: #c82333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            th, td {
                padding: 10px;
            }

            .btn-submit, .btn-back {
                font-size: 16px;
                padding: 10px;
            }
        }

    </style>
</head>
<body>

    <div class="attendance-container">
        <h2>Mark Manual Attendance</h2>

        <!-- Attendance Form -->
        <form id="attendanceForm">
            <div style="overflow-y: auto; max-height: 70vh;">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Roll Number</th>
                            <th>Present</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr class="attendance-row">
                            <td class="student-name" aria-label="Student Name">{{ student[1] }}</td> <!-- Student Name -->
                            <td>{{ student[2] }}</td> <!-- Roll Number -->
                            <td>
                                <input type="checkbox" name="attendance" data-student-id="{{ student[0] }}" class="attendance-checkbox" aria-label="Attendance Checkbox">
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <!-- Submit and Back Buttons -->
            <div class="button-container">
                <button type="button" class="btn-back" onclick="goBack()">← Back</button>
                <button type="submit" class="btn-submit" disabled>Submit Attendance</button>
            </div>
        </form>
    </div>

    <!-- Notification Popup -->
    <div id="notification" class="notification-popup">
        <button class="popup-btn-close" onclick="closePopup()">X</button>
        <span id="notification-message">Please mark at least one student's attendance.</span>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Handle form submission
            $('#attendanceForm').on('submit', function(event) {
                event.preventDefault();

                var attendanceData = [];
                var anyChecked = false;

                // Collect attendance data
                $('.attendance-checkbox').each(function() {
                    var studentId = $(this).data('student-id');
                    var isPresent = $(this).prop('checked');
                    
                    if (isPresent) {
                        anyChecked = true;
                    }

                    attendanceData.push({
                        'student_id': studentId,
                        'present': isPresent
                    });
                });

                if (!anyChecked) {
                    // Show the "No attendance marked" notification
                    $('#notification-message').text('Please mark at least one student\'s attendance.');
                    $('#notification').addClass('show');

                    // Hide the notification after 3 seconds
                    setTimeout(function() {
                        $('#notification').removeClass('show');
                    }, 3000);

                } else {
                    // Send to backend
                    fetch('/mark_manual_attendance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ attendance: attendanceData })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status) {
                            alert('Attendance Submitted Successfully!');
                            window.location.href = '/teacher_dashboard';
                        } else {
                            alert('Error: ' + data.error);
                        }
                    })
                    .catch(err => {
                        alert('Failed to submit attendance');
                        console.error(err);
                    });
                }
            });

            // Handle checkbox selection
            $('.attendance-checkbox').on('change', function() {
                $(this).closest('tr').toggleClass('selected-row');
                toggleSubmitButton();
            });

            // Enable Submit button if attendance has been marked
            function toggleSubmitButton() {
                var anyChecked = $('.attendance-checkbox:checked').length > 0;
                $('.btn-submit').prop('disabled', !anyChecked);
            }
        });

        // Close the notification popup manually
        function closePopup() {
            $('#notification').removeClass('show');
        }

        // Redirect to Teacher Dashboard
        function goBack() {
            window.location.href = '/teacher_dashboard';  // Replace with the actual Teacher Dashboard URL
        }
    </script>

</body>
</html>
