<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - SmartClass</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script> <!-- QR Code JS library -->
    <style>
        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px; /* Initially hidden */
            width: 250px;
            height: 100%;
            background-color: #2c3e50;
            color: white;
            transition: all 0.3s ease;
            padding-top: 20px;
        }

        .sidebar-header {
            text-align: center;
            padding: 15px;
            background-color: #34495e;
        }

        .sidebar-menu {
            list-style-type: none;
            padding: 0;
        }

        .sidebar-menu li {
            padding: 15px;
            border-bottom: 1px solid #7f8c8d;
        }

        .sidebar-menu li a {
            color: white;
            text-decoration: none;
            display: block;
        }

        .sidebar-menu li a:hover {
            background-color: #16a085;
        }

        /* Main Content */
        .main-content {
            margin-left: 0; /* Initially no sidebar visible */
            transition: all 0.3s ease;
        }

        .top-nav {
            background-color: #2980b9;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .top-nav-right {
            display: flex;
            align-items: center;
        }

        .top-nav-right span {
            margin-right: 15px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .card {
            border: 1px solid #ddd;
            padding: 20px;
            margin: 10px;
            border-radius: 5px;
            background-color: #ecf0f1;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 20px;
        }

        button {
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            margin: 10px 0;
        }

        button:hover {
            background-color: #2980b9;
        }

        #qr-box {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qrcode {
            display: inline-block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            background-color: #34495e;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        /* Styles for Attendance Report */
        .attendance-report {
            max-height: 400px; /* Set max height for scrollable area */
            overflow-y: auto; /* Allow scrolling */
            padding: 10px;
            margin-top: 20px;
            background-color: #ecf0f1;
            border-radius: 5px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1); /* Optional shadow for better visibility */
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #2980b9;
            color: white;
        }

        /* Ensuring the body or main content scrolls properly */
        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        /* Ensure main content can scroll */
        .main-content {
            padding-bottom: 50px; /* Add space for footer */
            overflow-y: auto; /* Allow vertical scrolling */
            height: 100vh; /* Full height */
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>SmartClass</h2>
        </div>
        <ul class="sidebar-menu">
            <!-- Link for 'Mark Manual Attendance' -->
            <li><a href="/mark_manual_attendance">Mark Manual Attendance</a></li>
            <!-- Link for 'View Attendance Report' -->
            <li><a href="#" id="view-attendance">View Attendance Report</a></li>
            <!-- Link for 'Attendance visualization' -->
            <li><a href="#" id="visualize-attendance">Visualize Attendance</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <button id="menu-toggle" class="menu-toggle">☰</button>
            <div class="top-nav-right">
                <span>Welcome, {{ teacher_name }}</span>
                <button class="logout-btn" onclick="window.location.href='/logout'">Logout</button>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <div class="content">
            <div class="row">
                <!-- QR Code Box -->
                <div class="card">
                    <h3>Scan to mark your attendance</h3>
                    <div id="qr-box">
                        <div id="qrcode"></div>
                    </div>
                    <button id="generate-qr" onclick="startQRRefresh()">Generate QR</button>
                </div>

                <!-- Attendance Report Download Box -->
                <div class="card">
                    <h3>Download Attendance Report</h3>
                    <button class="download-btn" onclick="downloadReport('pdf')">Download PDF</button>
                    <button class="download-btn" onclick="downloadReport('excel')">Download Excel</button>
                </div>

                <!-- Attendance Report -->
                <div id="attendance-report" class="card attendance-report" style="display:none;">
                    <h3>Attendance Report</h3>
                    <div id="attendance-table"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>SmartClass - A Secure Attendance System &copy; 2025</p>
    </footer>

    <!-- JS -->
    <script>
    let qrInterval = null;
    let countdownInterval = null;
    let qrExpiryTime = 10; // seconds

    // Sidebar Toggle
    document.getElementById('menu-toggle').addEventListener('click', function () {
        var sidebar = document.getElementById('sidebar');
        var mainContent = document.querySelector('.main-content');

        if (sidebar.style.left === '-250px') {
            sidebar.style.left = '0';
            mainContent.style.marginLeft = '250px';
        } else {
            sidebar.style.left = '-250px';
            mainContent.style.marginLeft = '0';
        }
    });

    // Attendance Report Load
    document.getElementById('view-attendance').addEventListener('click', function () {
        const students = [
            { name: 'Ravi Kumar', rollNumber: '123', attendance: 'Present' },
            { name: 'Sita Rani', rollNumber: '124', attendance: 'Absent' },
            { name: 'Vijay Kumar', rollNumber: '125', attendance: 'Present' },
            { name: 'Priya Rao', rollNumber: '126', attendance: 'Present' },
            { name: 'Irfhan', rollNumber: '127', attendance: 'Absent' },
            { name: 'Jaithra', rollNumber: '128', attendance: 'Present' },
            { name: 'Siddhartha', rollNumber: '129', attendance: 'Absent' },
            { name: 'Nikitha Chowdary', rollNumber: '130', attendance: 'Present' },
            { name: 'Pranav', rollNumber: '131', attendance: 'Absent' },
            { name: 'Ramya', rollNumber: '132', attendance: 'Present' }
        ];

        const reportContainer = document.getElementById('attendance-report');
        const tableContainer = document.getElementById('attendance-table');

        let tableHTML = '<table><tr><th>Student Name</th><th>Roll Number</th><th>Attendance</th></tr>';
        students.forEach(student => {
            tableHTML += `<tr><td>${student.name}</td><td>${student.rollNumber}</td><td>${student.attendance}</td></tr>`;
        });
        tableHTML += '</table>';

        tableContainer.innerHTML = tableHTML;
        reportContainer.style.display = 'block';
    });

    // Visualize
    document.getElementById('visualize-attendance').addEventListener('click', function () {
        alert("Coming Soon....");
    });

    // Dynamic QR Generator
    function startQRRefresh() {
        if (qrInterval) clearInterval(qrInterval);
        if (countdownInterval) clearInterval(countdownInterval);

        generateDynamicQR();
        qrInterval = setInterval(generateDynamicQR, qrExpiryTime * 1000);
    }

    function generateDynamicQR() {
        const qrBox = document.getElementById('qrcode');
        qrBox.innerHTML = ''; // Clear old QR

        const randomToken = Math.random().toString(36).substring(2, 10); // Simple random token
        const timestamp = Date.now(); // Current time

        const qrText = `SmartClass-${randomToken}-${timestamp}`;

        new QRCode(qrBox, {
            text: qrText,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Show expiry countdown
        showCountdown(qrExpiryTime);
    }

    function showCountdown(seconds) {
        const btn = document.getElementById('generate-qr');
        let remaining = seconds;
        btn.innerText = `QR valid for ${remaining}s`;

        countdownInterval = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(countdownInterval);
                btn.innerText = "Generating new QR...";
            } else {
                btn.innerText = `QR valid for ${remaining}s`;
            }
        }, 1000);
    }

    // Report Download
    function downloadReport(format) {
        alert('Downloading ' + format.toUpperCase() + ' report...');
    }
</script>
</body>
</html>
