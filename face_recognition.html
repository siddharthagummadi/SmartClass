<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartClass - Face Recognition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to right, skyblue, white);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 80px;
      color: #333;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: #1e3c72;
      padding: 15px 30px;
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      z-index: 999;
    }

    .navbar i {
      margin-right: 10px;
      color: #00f7ff;
    }

    #face-recognition-panel {
      background: hide;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 370px;
      position: relative;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .menu-item {
      background-color: #1e90ff;
      border: none;
      padding: 12px 22px;
      color: white;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s;
    }

    .menu-item i {
      margin-right: 8px;
    }

    .menu-item:hover {
      background-color: #0d6efd;
      transform: scale(1.05);
      box-shadow: 0 0 10px #0d6efd;
    }

    #camera-container {
      margin-top: 25px;
      border: 3px solid #1e90ff;
      padding: 18px;
      border-radius: 18px;
      background-color: #f8f9fa;
      width: 280px;
      height: 280px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 15px #1e90ff;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #1e90ff; }
      to   { box-shadow: 0 0 25px #0d6efd; }
    }

    #camera {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
    }

    #face-box {
      position: absolute;
      top: 60px;
      left: 60px;
      width: 160px;
      height: 160px;
      border: 3px dashed #1e90ff;
      border-radius: 10px;
      display: none;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    #recognition-text {
      margin-top: 16px;
      font-weight: 600;
      font-size: 16px;
      color: #1e3c72;
    }

    .popup {
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      animation: slideUpFade 1.8s ease forwards;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes slideUpFade {
      0% { bottom: -60px; opacity: 0; }
      40% { bottom: 10px; opacity: 1; }
      80% { bottom: 10px; opacity: 1; }
      100% { bottom: -60px; opacity: 0; }
    }

    #cancel-button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: transparent;
      border: none;
      font-size: 18px;
      color: #888;
      cursor: pointer;
    }

    #cancel-button:hover {
      color: #e63946;
    }

    #sound-toggle {
      margin-top: 15px;
      font-size: 18px;
      cursor: pointer;
      color: #1e90ff;
    }

    @media (max-width: 500px) {
      #face-recognition-panel {
        width: 90%;
        padding: 20px;
      }

      #camera-container {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <i class="fa-solid fa-chalkboard-user"></i> SmartClass - Face Recognition
  </div>

  <div id="face-recognition-panel">
    <h2 style="color: #1e3c72;">Face Recognition Panel</h2>
    <button id="verify-face" class="menu-item">
      <i class="fa-solid fa-camera"></i> Verify Face
    </button>

    <div id="camera-container" class="hidden">
      <button id="cancel-button" title="Close">&#10006;</button>
      <video id="camera" autoplay></video>
      <div id="face-box"></div>
      <p id="recognition-text">Initializing camera...</p>
    </div>

    <div id="popup" class="popup hidden"></div>

    <div id="sound-toggle" title="Toggle sound">
      <i class="fa-solid fa-volume-up"></i> Toggle Sound
    </div>
  </div>

  <!-- Audio elements -->
  <audio id="success-sound" src="https://www.myinstants.com/media/sounds/success-fanfare-trumpets.mp3"></audio>
  <audio id="fail-sound" src="https://www.myinstants.com/media/sounds/error.mp3"></audio>

  <script>
    const verifyButton = document.getElementById("verify-face");
    const cameraContainer = document.getElementById("camera-container");
    const camera = document.getElementById("camera");
    const recognitionText = document.getElementById("recognition-text");
    const popup = document.getElementById("popup");
    const cancelBtn = document.getElementById("cancel-button");
    const faceBox = document.getElementById("face-box");
    const successSound = document.getElementById("success-sound");
    const failSound = document.getElementById("fail-sound");
    const soundToggle = document.getElementById("sound-toggle");

    let soundEnabled = true;

    // Toggle sound on/off
    soundToggle.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundToggle.innerHTML = soundEnabled ? 
        '<i class="fa-solid fa-volume-up"></i> Toggle Sound' : 
        '<i class="fa-solid fa-volume-mute"></i> Sound Muted';
    });

    // Text-to-speech function
    function speak(message) {
      const speech = new SpeechSynthesisUtterance(message);
      speech.lang = "en-US";  // You can change the language here if needed
      window.speechSynthesis.speak(speech);
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        camera.srcObject = stream;
      } catch (err) {
        recognitionText.innerText = "Camera access denied ❌";
        console.error("Error accessing the camera:", err);
      }
    }

    function stopCamera() {
      const stream = camera.srcObject;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        camera.srcObject = null;
      }
    }

    verifyButton.addEventListener("click", async () => {
      cameraContainer.classList.remove("hidden");
      recognitionText.innerText = "Initializing camera...";
      await startCamera();

      faceBox.style.display = "block";

      setTimeout(() => {
        recognitionText.innerText = "Detecting face...";
      }, 1500);

      setTimeout(() => {
        const isSuccess = Math.random() > 0.3;

        if (isSuccess) {
          recognitionText.innerText = "Face recognized successfully ✅";
          popup.innerText = "Attendance Marked Successfully ✅";
          popup.style.backgroundColor = "#28a745";
          if (soundEnabled) {
            // Use TTS to announce success
            speak("Your attendance has been marked successfully,Thank You");
          }
        } else {
          recognitionText.innerText = "Face not recognized ❌";
          popup.innerText = "Face Recognition Failed ❌";
          popup.style.backgroundColor = "#dc3545";
          if (soundEnabled) {
            // Use TTS to announce failure
            speak("Face verification failed, Please try again");
          }
        }

        popup.classList.remove("hidden");
        stopCamera();
        cameraContainer.classList.add("hidden");
        faceBox.style.display = "none";

        setTimeout(() => {
          popup.classList.add("hidden");
        }, 1800);
      }, 3200);
    });

    cancelBtn.addEventListener("click", () => {
      stopCamera();
      cameraContainer.classList.add("hidden");
    });
  </script>
</body>
</html>
